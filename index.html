<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Amalfi - Heidelberg</title>
    <style>
        :root {
            --red: #d32f2f;
            --dark-red: #b71c1c;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --bg-black: #111;
            --pure-black: #000;
            --text-main: #fff;
            --text-muted: #aaa;
        }

        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-black); color: var(--text-main); line-height: 1.6; }
        a { text-decoration: none; color: inherit; transition: all 0.3s; }
        
        header { background-color: var(--pure-black); padding: 20px; border-bottom: 3px solid var(--red); display: flex; justify-content: flex-end; align-items: center; position: relative; z-index: 10; }
        header::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 33.33%; height: 3px; background-color: var(--green); }
        header::before { content: ''; position: absolute; bottom: -3px; left: 33.33%; width: 33.33%; height: 3px; background-color: #fff; }

        .logo-area { text-align: right; }
        .logo-area h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; font-weight: bold; }
        .logo-area p { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .logo-area .location { font-size: 1.1rem; margin-top: 5px; }

        .main-container { display: flex; min-height: calc(100vh - 150px); }

        .hero-section { flex: 1.5; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; text-align: center; background-image: url('pizza.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .hero-section::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%); z-index: 1; }
        
        .hero-content { position: relative; z-index: 2; max-width: 600px; }
        .hero-content h2 { font-size: 3.5rem; margin: 0; line-height: 1.1; letter-spacing: -1px; }
        .hero-content p { font-size: 1.2rem; color: #ccc; margin: 20px 0 40px 0; }

        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 15px 30px; border: 2px solid #fff; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; cursor: pointer; }
        .btn:hover { background-color: #fff; color: #000; }
        .btn-red { background-color: var(--red); border-color: var(--red); }
        .btn-call { background-color: var(--green); border-color: var(--green); border: none; }

        .menu-section { flex: 1; background-color: var(--pure-black); padding: 60px 40px; }
        .menu-section h2 { font-size: 2.5rem; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 15px; }

        .menu-categories { display: flex; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; flex-wrap: wrap;}
        .menu-categories a { color: var(--text-muted); font-weight: bold; font-size: 1rem; text-transform: uppercase; padding-bottom: 5px; border-bottom: 2px solid transparent; cursor: pointer; }
        .menu-categories a.active { color: var(--text-main); border-bottom-color: var(--red); }

        .menu-tab { display: none; }
        .menu-tab.active-tab { display: block; }

        .menu-list h3 { color: var(--red); text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; margin-top: 30px; margin-bottom: 10px; border-bottom: 1px dotted #333; padding-bottom: 5px; }
        
        .menu-item { margin-bottom: 15px; display: flex; flex-direction: column; }
        .menu-item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
        .item-name { font-weight: bold; font-size: 1.1rem; }
        .item-description { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; max-width: 85%; }
        .item-price-single { font-weight: bold; font-size: 1rem; text-align: right; white-space: nowrap; }

        footer { background-color: var(--pure-black); padding: 40px; border-top: 1px solid #333; text-align: center; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
